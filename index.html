<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Questions and Voting</title>
  </head>

  <body>
    <h1>Questions and Voting</h1>

    <form id="questionForm">
      <label for="questionInput">Your question:</label>
      <br /><br />

      <textarea
        id="questionInput"
        name="question"
        rows="4"
        cols="50"
        placeholder="Write your question here"
        required
      ></textarea>

      <br /><br />

      <button type="button">Add question</button>
    </form>

    <hr />

    <h2>Questions</h2>

    <ul id="questionsList">
      <li>
        <strong>Example question?</strong>
        <br />
        Votes: 0
        <br />
        <button type="button">Vote for this question</button>
      </li>
    </ul>
    <script defer type="module" src="main.js"></script>
  </body>
</html>
